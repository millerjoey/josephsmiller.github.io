<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" role="img" aria-labelledby="title desc">
  <title id="title">Coverage and coreset selections on the same one-dimensional sample</title>
  <desc id="desc">Twenty observations form a dense left group, a medium-sized middle group, and a small right group. Four coverage atoms with weight 0.25 span the range. Four weighted coreset atoms preserve the uneven empirical mass.</desc>
  <style>
    text { font-family: 'Crimson Pro', 'Times New Roman', serif; fill: #5b6673; }
    .heading { fill: #1f2a37; font-size: 18px; font-weight: 600; }
    .label { font-size: 14px; }
    .small { font-size: 12px; }
    .axis { stroke: #1f2a37; stroke-opacity: 0.34; stroke-width: 1.2; }
    .guide { stroke: #1f2a37; stroke-opacity: 0.09; stroke-width: 1; }
    .sample { fill: #5b6673; fill-opacity: 0.42; }
    .candidate { fill: #5b6673; fill-opacity: 0.22; }
    .selected { fill: #8b3a3a; fill-opacity: 0.80; stroke: #8b3a3a; stroke-width: 1.2; }
    .point-value { fill: #1f2a37; font-size: 13px; font-weight: 600; }
    .mass-value { fill: #8b3a3a; font-family: Arial, Helvetica, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
  </style>
  <rect width="980" height="480" fill="#ffffff"/>

  <text class="heading" x="84" y="38">Empirical target: 20 equally weighted observations</text>
  <line class="axis" x1="84" y1="93" x2="916" y2="93"/>
  <g aria-label="Empirical observations">
    <circle class="sample" cx="108.1" cy="93" r="4.3"/><circle class="sample" cx="132.2" cy="93" r="4.3"/>
    <circle class="sample" cx="156.3" cy="93" r="4.3"/><circle class="sample" cx="180.5" cy="93" r="4.3"/>
    <circle class="sample" cx="204.6" cy="93" r="4.3"/><circle class="sample" cx="228.7" cy="93" r="4.3"/>
    <circle class="sample" cx="252.8" cy="93" r="4.3"/><circle class="sample" cx="276.9" cy="93" r="4.3"/>
    <circle class="sample" cx="301.0" cy="93" r="4.3"/><circle class="sample" cx="325.2" cy="93" r="4.3"/>
    <circle class="sample" cx="349.3" cy="93" r="4.3"/><circle class="sample" cx="373.4" cy="93" r="4.3"/>
    <circle class="sample" cx="397.5" cy="93" r="4.3"/>
    <circle class="sample" cx="578.4" cy="93" r="4.3"/><circle class="sample" cx="602.5" cy="93" r="4.3"/>
    <circle class="sample" cx="626.6" cy="93" r="4.3"/><circle class="sample" cx="650.7" cy="93" r="4.3"/>
    <circle class="sample" cx="674.8" cy="93" r="4.3"/>
    <circle class="sample" cx="867.8" cy="93" r="4.3"/><circle class="sample" cx="891.9" cy="93" r="4.3"/>
  </g>
  <text class="label" x="252" y="122" text-anchor="middle">13 observations</text>
  <text class="label" x="627" y="122" text-anchor="middle">5</text>
  <text class="label" x="880" y="122" text-anchor="middle">2</text>

  <text class="heading" x="84" y="177">Coverage: four equal allocations</text>
  <text class="small" x="84" y="198">maximize H<tspan baseline-shift="sub">K</tspan>(u<tspan baseline-shift="sub">S</tspan>)</text>
  <line class="axis" x1="84" y1="235" x2="916" y2="235"/>
  <g aria-label="Coverage candidates">
    <circle class="candidate" cx="108.1" cy="235" r="3"/><circle class="candidate" cx="132.2" cy="235" r="3"/>
    <circle class="candidate" cx="156.3" cy="235" r="3"/><circle class="candidate" cx="180.5" cy="235" r="3"/>
    <circle class="candidate" cx="204.6" cy="235" r="3"/><circle class="candidate" cx="228.7" cy="235" r="3"/>
    <circle class="candidate" cx="252.8" cy="235" r="3"/><circle class="candidate" cx="276.9" cy="235" r="3"/>
    <circle class="candidate" cx="301.0" cy="235" r="3"/><circle class="candidate" cx="325.2" cy="235" r="3"/>
    <circle class="candidate" cx="349.3" cy="235" r="3"/><circle class="candidate" cx="373.4" cy="235" r="3"/>
    <circle class="candidate" cx="397.5" cy="235" r="3"/>
    <circle class="candidate" cx="578.4" cy="235" r="3"/><circle class="candidate" cx="602.5" cy="235" r="3"/>
    <circle class="candidate" cx="626.6" cy="235" r="3"/><circle class="candidate" cx="650.7" cy="235" r="3"/>
    <circle class="candidate" cx="674.8" cy="235" r="3"/>
    <circle class="candidate" cx="867.8" cy="235" r="3"/><circle class="candidate" cx="891.9" cy="235" r="3"/>
  </g>
  <circle class="selected" cx="108.1" cy="235" r="9"/>
  <circle class="selected" cx="373.4" cy="235" r="9"/>
  <circle class="selected" cx="626.6" cy="235" r="9"/>
  <circle class="selected" cx="891.9" cy="235" r="9"/>
  <text class="point-value" x="108.1" y="263" text-anchor="middle">−1.50</text>
  <text class="point-value" x="373.4" y="263" text-anchor="middle">−0.40</text>
  <text class="point-value" x="626.6" y="263" text-anchor="middle">0.65</text>
  <text class="point-value" x="891.9" y="263" text-anchor="middle">1.75</text>
  <text class="mass-value" x="108.1" y="281" text-anchor="middle">w = 0.250</text>
  <text class="mass-value" x="373.4" y="281" text-anchor="middle">w = 0.250</text>
  <text class="mass-value" x="626.6" y="281" text-anchor="middle">w = 0.250</text>
  <text class="mass-value" x="891.9" y="281" text-anchor="middle">w = 0.250</text>

  <text class="heading" x="84" y="321">Coreset: four weighted representatives</text>
  <text class="small" x="84" y="342">minimize D<tspan baseline-shift="sub">K</tspan>(p<tspan baseline-shift="sub">M</tspan>, q<tspan baseline-shift="sub">S,w</tspan>)</text>
  <line class="axis" x1="84" y1="379" x2="916" y2="379"/>
  <circle class="selected" cx="180.5" cy="379" r="15"/>
  <circle class="selected" cx="325.2" cy="379" r="15"/>
  <circle class="selected" cx="626.6" cy="379" r="13"/>
  <circle class="selected" cx="867.8" cy="379" r="8.5"/>
  <text class="point-value" x="180.5" y="411" text-anchor="middle">−1.20</text>
  <text class="point-value" x="325.2" y="411" text-anchor="middle">−0.60</text>
  <text class="point-value" x="626.6" y="411" text-anchor="middle">0.65</text>
  <text class="point-value" x="867.8" y="411" text-anchor="middle">1.65</text>
  <text class="mass-value" x="180.5" y="430" text-anchor="middle">w = 0.324</text>
  <text class="mass-value" x="325.2" y="430" text-anchor="middle">w = 0.325</text>
  <text class="mass-value" x="626.6" y="430" text-anchor="middle">w = 0.248</text>
  <text class="mass-value" x="867.8" y="430" text-anchor="middle">w = 0.103</text>

  <line class="guide" x1="228.7" y1="79" x2="228.7" y2="387"/>
  <line class="guide" x1="469.8" y1="79" x2="469.8" y2="387"/>
  <line class="guide" x1="710.9" y1="79" x2="710.9" y2="387"/>
  <text class="small" x="228.7" y="470" text-anchor="middle">−1</text>
  <text class="small" x="469.8" y="470" text-anchor="middle">0</text>
  <text class="small" x="710.9" y="470" text-anchor="middle">1</text>
</svg>
